name: SEO Weekly Sync

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync-seo:
    name: Sync GSC to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create GSC key file from secret
        run: |
          mkdir -p config
          echo '${{ secrets.GSC_KEY }}' > config/gsc-key.json

      - name: Run SEO sync
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/sync-seo-to-supabase.js

      - name: Clean up key file
        if: always()
        run: rm -f config/gsc-key.json
